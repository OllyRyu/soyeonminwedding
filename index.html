  /* ============================================================
     BASE
     ============================================================ */
  *{ -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; }
  body{

    font-family:var(--body);
    color:var(--text);
    transition:background .5s ease;
  }
  #app{ background:var(--bg); transition:background .6s ease, color .6s ease; position:relative; overflow:hidden; }
  .inv{ font-family:var(--body); color:var(--text); }
  .head{ font-family:var(--heading); }
  .accent{ color:var(--accent); }

  /* 폰 프레임(데스크탑에서 모바일처럼 보이도록) */
  .frame{ max-width:430px; margin:0 auto; min-height:100vh; position:relative; }

  /* 섹션 공통 */
  .sec{ padding:56px 26px; position:relative; z-index:1; }
  .sec-eyebrow{
    font-family:var(--heading); letter-spacing:.34em; text-transform:uppercase;
    font-size:11px; color:var(--accent); font-weight:600; margin-bottom:10px;
  }
  .sec-title{ font-family:var(--heading); font-size:26px; font-weight:600; line-height:1.3; }
  .card{
    background:var(--bg2); border-radius:var(--radius); box-shadow:var(--shadow);
    border:1px solid var(--line);
  }
  .divider{ width:46px; height:1px; background:var(--accent); margin:18px auto; opacity:.7; }

  /* 버튼 */
  .btn{
    border-radius:calc(var(--radius) - 2px); border:1px solid var(--line);
    background:var(--bg2); color:var(--text); font-weight:500;
    transition:transform .15s ease, box-shadow .2s ease, background .2s ease;
    font-size:14px;
  }
  .btn:active{ transform:scale(.96); }
  .btn-accent{ background:var(--accent); color:#fff; border-color:var(--accent); }
  [data-theme="dark"] .btn-accent,[data-theme="tech"] .btn-accent{ color:#0a0d14; }

  /* 인풋 */
  .field{
    background:var(--bg); border:1px solid var(--line); color:var(--text);
    border-radius:calc(var(--radius) - 4px); padding:12px 14px; font-size:14px; width:100%;
    font-family:var(--body); transition:border .2s ease, box-shadow .2s ease;
  }
  .field:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent); }
  .field::placeholder{ color:var(--muted); }

  /* 등장 애니메이션 */
  .reveal{ opacity:0; transform:translateY(22px); transition:opacity .8s ease, transform .8s ease; }
  .reveal.in{ opacity:1; transform:none; }

  /* 카운트다운 박스 */
  .cd-box{
    background:var(--bg2); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 6px; text-align:center; box-shadow:var(--shadow);
  }
  .cd-num{ font-family:var(--heading); font-size:30px; font-weight:700; color:var(--accent); line-height:1; }
  .cd-lbl{ font-size:11px; color:var(--muted); margin-top:6px; letter-spacing:.1em; }

  /* 갤러리 스와이프 */
  .carousel{ display:flex; gap:12px; overflow-x:auto; scroll-snap-type:x mandatory; padding-bottom:6px; -ms-overflow-style:none; scrollbar-width:none; }
  .carousel::-webkit-scrollbar{ display:none; }
  .slide{ flex:0 0 78%; scroll-snap-align:center; border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
  .slide img{ width:100%; height:300px; object-fit:cover; display:block; }
  .gimg{ width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:calc(var(--radius) - 4px); display:block; }

  /* 토스트 */
  #toasts{ position:fixed; left:50%; bottom:96px; transform:translateX(-50%); z-index:120; display:flex; flex-direction:column; gap:8px; align-items:center; pointer-events:none; }
  .toast{
    background:rgba(20,20,24,.92); color:#fff; padding:11px 20px; border-radius:999px;

    opacity:0; transform:translateY(12px); transition:opacity .3s, transform .3s; display:flex; align-items:center; gap:8px;
    backdrop-filter:blur(6px);
  }
  .toast.show{ opacity:1; transform:none; }

     THEME-SPECIFIC DECORATIONS
     ============================================================ */
  /* Classic — 골드 더블 라인 */

  [data-theme="botanical"] #app::before{

    background:

  [data-theme="tech"] #app::before{

  .blob{ position:absolute; border-radius:50%; filter:blur(60px); opacity:0; pointer-events:none; transition:opacity .6s; }
  [data-theme="abstract"] .blob{ opacity:.55; animation:float 14s ease-in-out infinite; }

    border:1px solid transparent; cursor:pointer; transition:all .2s ease; font-family:'Noto Sans KR',sans-serif;
  }
  .chip:hover{ background:rgba(255,255,255,.12); }
  .chip.active{ background:#fff; color:#1a1a1a; border-color:#fff; }
  .chip .dot{ width:11px; height:11px; border-radius:50%; box-shadow:0 0 0 1px rgba(255,255,255,.25) inset; }
  #selector .label{ color:#9aa0ad; font-size:11px; letter-spacing:.08em; text-transform:uppercase; padding:0 4px 6px; display:flex; justify-content:space-between; }
  #selector .label b{ color:#fff; font-weight:600; }

  .pad-bottom{ height:120px; }

function showToast(msg, icon='✓'){
  const box = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span>${icon}</span><span>${esc(msg)}</span>`;
  box.appendChild(el);
  requestAnimationFrame(()=> el.classList.add('show'));
  setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(),320); }, 2200);
}

async function copyText(text){
  try{
    if(navigator.clipboard && window.isSecureContext){
      await navigator.clipboard.writeText(text);
    }else{
      const ta=document.createElement('textarea'); ta.value=text;
      ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); ta.remove();
    }
    showToast('계좌번호가 복사되었습니다');
  }catch(e){ showToast('복사에 실패했습니다','✕'); }
}

let cdTimer=null;
function startCountdown(){
  if(cdTimer) clearInterval(cdTimer);
  const tick=()=>{
    const now=new Date();
    let diff=Math.floor((DATA.date - now)/1000);
    const set=(id,v)=>{ const e=document.getElementById(id); if(e) e.textContent=v; };
    if(diff<=0){
      set('cd-d',0); set('cd-h',0); set('cd-m',0); set('cd-s',0);
      const dd=document.getElementById('cd-dday'); if(dd) dd.textContent='D-DAY';
      clearInterval(cdTimer); return;
    }
    const d=Math.floor(diff/86400); diff-=d*86400;
    const h=Math.floor(diff/3600);  diff-=h*3600;
    const m=Math.floor(diff/60);    const s=diff-m*60;
    set('cd-d',d); set('cd-h',String(h).padStart(2,'0'));
    set('cd-m',String(m).padStart(2,'0')); set('cd-s',String(s).padStart(2,'0'));
    const dd=document.getElementById('cd-dday'); if(dd) dd.textContent='D-'+d;
  };
  tick(); cdTimer=setInterval(tick,1000);
}

/* RSVP 응답을 백엔드로 전송 + localStorage 백업 */
async function submitRsvp(payload){
  // 1) 항상 브라우저에 백업(엔드포인트 실패/미설정 대비)
  try{
    const key='rsvp_responses';
    const list=JSON.parse(localStorage.getItem(key)||'[]');
    list.push(payload);
    localStorage.setItem(key, JSON.stringify(list));
  }catch(e){ /* localStorage 불가 환경 무시 */ }

  // 2) 엔드포인트가 설정되어 있으면 전송 (구글 Apps Script 권장)
  if(CONFIG.rsvpEndpoint){
    // Apps Script 웹앱은 CORS 응답을 안 주므로 no-cors로 전송(응답 본문은 못 읽음)
    await fetch(CONFIG.rsvpEndpoint, {
      method:'POST', mode:'no-cors',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body:JSON.stringify(payload)
    });
  }
}

function wireFeatures(){
  document.querySelectorAll('.copy-btn').forEach(b=>{
    b.addEventListener('click',()=>copyText(b.dataset.copy));
  });

  const form=document.getElementById('rsvpForm');
  if(form){
    form.addEventListener('submit',async e=>{
      e.preventDefault();
      const f=new FormData(form);
      const name=f.get('guestName');
      const attend=f.get('attend');
      const payload={
        side:f.get('side'), attend, guestName:name,
        party:Number(f.get('party')||0), meal:f.get('meal'),
        submittedAt:new Date().toISOString()
      };
      const btn=form.querySelector('button[type=submit]');
      const orig=btn.textContent;
      btn.disabled=true; btn.textContent='전송 중…';
      try{
        await submitRsvp(payload);
        showToast(`${name}님, ${attend==='참석'?'참석':'불참'} 의사가 전달되었습니다`, '🎉');
        form.reset();
      }catch(err){
        // localStorage 백업은 이미 됐으므로 안내만
        showToast('전송이 지연되었어요. 잠시 후 다시 시도해 주세요', '⚠️');
      }finally{
        btn.disabled=false; btn.textContent=orig;
      }
    });
  }

  // 공유 버튼
  const linkBtn=document.getElementById('shareLink');
  if(linkBtn) linkBtn.addEventListener('click', ()=> copyShareLink());
  const kakaoBtn=document.getElementById('shareKakao');
  if(kakaoBtn) kakaoBtn.addEventListener('click', ()=> shareKakao());

  // 방명록
  const gbForm=document.getElementById('gbForm');
  if(gbForm){
    gbForm.addEventListener('submit', async e=>{
      e.preventDefault();
      const f=new FormData(gbForm);
      const entry={
        id:'g'+Date.now()+Math.random().toString(36).slice(2,6),
        name:(f.get('gbName')||'').toString().trim(),
        message:(f.get('gbMsg')||'').toString().trim(),
        password:(f.get('gbPass')||'').toString(),
        date:new Date().toISOString()
      };
      if(!entry.name || !entry.message) return;
      const btn=gbForm.querySelector('button[type=submit]');
      const orig=btn.textContent; btn.disabled=true; btn.textContent='등록 중…';
      try{ await gbAdd(entry); showToast('축하 메시지가 등록되었습니다','💌'); gbForm.reset(); }
      catch(err){ showToast('등록이 지연되었어요. 다시 시도해 주세요','⚠️'); }
      finally{ btn.disabled=false; btn.textContent=orig; }
    });
  }
  const gbMoreBtn=document.getElementById('gbMoreBtn');
  if(gbMoreBtn) gbMoreBtn.addEventListener('click', ()=>{ gbShown+=GB_PAGE; gbRender(); });
  gbLoad();

  startCountdown();
}

/* ============================================================
   4-b) 공유 (카카오톡 / 기본 공유 / 링크 복사)
   ============================================================ */
function shareUrl(){ return CONFIG.shareUrl || location.href; }

async function copyShareLink(){
  const url=shareUrl();
  // 네이티브 공유가 가능하면 우선 사용(모바일)
  if(navigator.share){
    try{ await navigator.share({ title:document.title, text:`${DATA.groom.name} ♥ ${DATA.bride.name} 결혼합니다`, url }); return; }
    catch(e){ if(e && e.name==='AbortError') return; /* 취소 외엔 복사로 폴백 */ }
  }
  try{
    if(navigator.clipboard && window.isSecureContext){ await navigator.clipboard.writeText(url); }
    else{ const ta=document.createElement('textarea'); ta.value=url; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
    showToast('청첩장 링크가 복사되었습니다', '🔗');
  }catch(e){ showToast('복사에 실패했습니다','✕'); }
}

function shareKakao(){
  if(window.Kakao && Kakao.isInitialized && Kakao.isInitialized()){
    Kakao.Share.sendDefault({
      objectType:'feed',
      content:{
        title:`${DATA.groom.name} ♥ ${DATA.bride.name} 결혼합니다`,
        description:`${DATA.dateText}\n${DATA.venue} ${DATA.hall}`,
        imageUrl:DATA.gallery[2],
        link:{ mobileWebUrl:shareUrl(), webUrl:shareUrl() }
      },
      buttons:[{ title:'청첩장 보기', link:{ mobileWebUrl:shareUrl(), webUrl:shareUrl() } }]
    });
  }else{
    // 카카오 키 미설정 → 기본 공유/링크 복사로 대체
    copyShareLink();
  }
}

/* 카카오 SDK는 키가 설정된 경우에만 로드 */
function initKakao(){
  if(!CONFIG.kakaoJsKey) return;
  const s=document.createElement('script');
  s.src='https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js';
  s.onload=()=>{ try{ Kakao.init(CONFIG.kakaoJsKey); }catch(e){} };
  document.head.appendChild(s);
}

/* ============================================================
   4-c) 방명록 (Guestbook)
   ------------------------------------------------------------
   • 엔드포인트가 있으면 서버(구글 시트)에서 읽고/쓰고,
     없으면 본인 브라우저(localStorage)에만 저장합니다.
   • 읽기는 JSONP(script 태그)로 — Apps Script는 교차 출처 GET을
     막기 때문에 fetch 대신 callback 방식을 사용합니다.
   ============================================================ */
const GB_PAGE=5;          // 한 번에 보여줄 메시지 수
let gbCache=[];           // 최신순 정렬된 전체 메시지
let gbShown=GB_PAGE;      // 현재 화면에 노출된 개수

const gbKey='guestbook_entries';
const gbLoadLocal=()=>{ try{ return JSON.parse(localStorage.getItem(gbKey)||'[]'); }catch(e){ return []; } };
const gbSaveLocal=list=>{ try{ localStorage.setItem(gbKey, JSON.stringify(list)); }catch(e){} };

function gbFmtDate(iso){
  const d=new Date(iso); if(isNaN(d)) return '';
  const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function gbRender(){
  const listEl=document.getElementById('gbList');
  const moreEl=document.getElementById('gbMore');
  if(!listEl) return;
  if(!gbCache.length){
    listEl.innerHTML=`<p style="text-align:center; color:var(--muted); font-size:13px; padding:18px 0;">첫 번째 축하 메시지를 남겨 주세요 🤍</p>`;
    if(moreEl) moreEl.style.display='none'; return;
  }
  listEl.innerHTML=gbCache.slice(0,gbShown).map(c=>`
    <div class="card" style="padding:14px 16px;">
      <div style="display:flex; justify-content:space-between; align-items:baseline; gap:10px;">
        <span style="font-weight:600;">${esc(c.name)}</span>
        <span style="display:flex; gap:10px; align-items:center;">
          <span style="font-size:11.5px; color:var(--muted);">${esc(gbFmtDate(c.date))}</span>
          <button class="gb-del" data-id="${esc(c.id)}" title="삭제" style="background:none; border:0; color:var(--muted); cursor:pointer; font-size:14px; line-height:1; padding:2px;">✕</button>
        </span>
      </div>
      <p style="white-space:pre-line; margin-top:8px; font-size:14px; line-height:1.7;">${esc(c.message)}</p>
    </div>`).join('');
  listEl.querySelectorAll('.gb-del').forEach(b=> b.addEventListener('click', ()=> gbDelete(b.dataset.id)));
  if(moreEl) moreEl.style.display = gbCache.length>gbShown ? 'block' : 'none';
}

/* JSONP로 원격 방명록 읽기 */
function gbFetchRemote(){
  return new Promise(resolve=>{
    const cb='gbcb_'+Math.random().toString(36).slice(2);
    const s=document.createElement('script');
    const done=val=>{ clearTimeout(t); try{ delete window[cb]; }catch(e){} s.remove(); resolve(val); };
    const t=setTimeout(()=>done(null), 8000);
    window[cb]=data=> done(Array.isArray(data) ? data : (data && data.entries) || []);
    s.onerror=()=>done(null);
    const sep=CONFIG.guestbookEndpoint.includes('?')?'&':'?';
    s.src=`${CONFIG.guestbookEndpoint}${sep}type=guestbook&callback=${cb}`;
    document.body.appendChild(s);
  });
}

async function gbLoad(){
  let list=null;
  if(CONFIG.guestbookEndpoint) list=await gbFetchRemote();
  if(!list) list=gbLoadLocal();
  gbCache=list.slice().sort((a,b)=> new Date(b.date)-new Date(a.date));
  gbShown=GB_PAGE; gbRender();
}

async function gbAdd(entry){
  const local=gbLoadLocal(); local.push(entry); gbSaveLocal(local);
  gbCache.unshift(entry); gbRender();
  if(CONFIG.guestbookEndpoint){
    await fetch(CONFIG.guestbookEndpoint, {
      method:'POST', mode:'no-cors', headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body:JSON.stringify({ type:'guestbook', action:'add', ...entry })
    });
  }
}

async function gbDelete(id){
  const item=gbCache.find(c=>String(c.id)===String(id));
  if(!item) return;
  const pass=prompt('작성 시 입력한 비밀번호를 입력하세요');
  if(pass===null) return;
  // 로컬 항목엔 비밀번호가 있으므로 즉시 검증 / 원격 항목은 서버가 검증
  if(item.password!=null && item.password!=='' && String(pass)!==String(item.password)){
    showToast('비밀번호가 일치하지 않습니다','✕'); return;
  }
  gbCache=gbCache.filter(c=>String(c.id)!==String(id));
  gbSaveLocal(gbLoadLocal().filter(c=>String(c.id)!==String(id)));
  gbRender();
  if(CONFIG.guestbookEndpoint){
    await fetch(CONFIG.guestbookEndpoint, {
      method:'POST', mode:'no-cors', headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body:JSON.stringify({ type:'guestbook', action:'delete', id, password:pass })
    });
  }
  showToast('메시지가 삭제되었습니다');
}

/* 스크롤 등장 애니메이션 */
let io=null;
function observeReveal(){
  if(io) io.disconnect();
  io=new IntersectionObserver(es=>{
    es.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target);} });
  },{ threshold:.12 });
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
}

/* ============================================================
   5) 테마 셀렉터
   ============================================================ */
function setTheme(id){
  document.getElementById('app').setAttribute('data-theme', id);
  const t=THEMES.find(x=>x.id===id);
  document.getElementById('curName').textContent=t? t.en : id;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active', c.dataset.id===id));
  document.querySelector('meta[name=theme-color]').setAttribute('content', t? t.dot : '#b08d57');
  window.scrollTo({ top:0, behavior:'smooth' });
}

function buildSelector(){
  const wrap=document.getElementById('chips');
  wrap.innerHTML=THEMES.map((t,i)=>`
    <button class="chip ${i===0?'active':''}" data-id="${t.id}">
      <span class="dot" style="background:${t.dot}"></span>
      <span>${i+1}. ${t.ko}</span>
    </button>`).join('');
  wrap.querySelectorAll('.chip').forEach(c=> c.addEventListener('click',()=>setTheme(c.dataset.id)));
}

/* ============================================================
   6) INIT
   ============================================================ */
render();
buildSelector();
initKakao();

/* ============================================================
   ▣ 백엔드 (선택) — RSVP + 방명록을 구글 시트로 무료 저장하기
   ------------------------------------------------------------
   1) 구글 시트 새로 만들기 → 시트 탭 2개를 만들고 이름을
      각각 "RSVP", "Guestbook" 으로 변경
   2) 메뉴 [확장 프로그램] → [Apps Script] → 아래 코드 붙여넣고 저장:

        function doPost(e){
          var ss = SpreadsheetApp.getActiveSpreadsheet();
          var d  = JSON.parse(e.postData.contents);
          if (d.type === 'guestbook') {
            var gb = ss.getSheetByName('Guestbook');
            if (d.action === 'delete') {
              var v = gb.getDataRange().getValues();
              for (var i = v.length - 1; i >= 1; i--) {
                if (String(v[i][1]) === String(d.id) &&
                    String(v[i][4]) === String(d.password)) { gb.deleteRow(i + 1); break; }
              }
            } else {
              gb.appendRow([new Date(), d.id, d.name, d.message, d.password]);
            }
          } else {
            ss.getSheetByName('RSVP')
              .appendRow([new Date(), d.side, d.attend, d.guestName, d.party, d.meal]);
          }
          return ContentService.createTextOutput('ok');
        }

        // 방명록 읽기 (JSONP) — 비밀번호는 내려보내지 않음
        function doGet(e){
          var gb = SpreadsheetApp.getActiveSpreadsheet().getSheetByName('Guestbook');
          var v  = gb.getDataRange().getValues();
          var out = [];
          for (var i = 1; i < v.length; i++) {
            out.push({ date: v[i][0], id: v[i][1], name: v[i][2], message: v[i][3] });
          }
          var body = (e.parameter.callback || 'callback') + '(' + JSON.stringify(out) + ')';
          return ContentService.createTextOutput(body)
                 .setMimeType(ContentService.MimeType.JAVASCRIPT);
        }

   3) [배포] → [새 배포] → 유형:"웹 앱"
      · 실행 계정: 본인 · 액세스 권한: "모든 사용자"
      → 나오는 URL(.../exec)을 위쪽 CONFIG.rsvpEndpoint 와
        CONFIG.guestbookEndpoint 에 (같은 주소로) 붙여넣기
   ------------------------------------------------------------
   ※ 엔드포인트를 비우면 RSVP·방명록 모두 방문자 브라우저(localStorage)에만
     임시 저장됩니다(다른 사람에겐 안 보임). 운영용은 위 연결을 권장합니다.
   ============================================================ */
</script>
